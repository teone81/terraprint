version: '3.8'

services:
  streamlit-topography:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: topografia-3d
    ports:
      - "8501:8501"
    volumes:
      # Monta la cartella corrente in /app in modalità sviluppo.
      # Consente l'hot-reload live del codice quando viene modificato.
      - .:/app
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=500  # Permette di caricare DTM di grandi dimensioni
    restart: unless-stopped
